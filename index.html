      React.createElement(Stat,{label:"Production",value:SHIPS.filter(s=>s.status==="production").length,color:C.amber,small:true}),
      React.createElement(Stat,{label:"Misrouted",value:"1",color:C.red,small:true,alert:true})
    ),
    ["misrouted","receiving","in_transit","production","received"].map(status=>{
      const items=SHIPS.filter(s=>s.status===status);
      if(!items.length) return null;
      const labels={received:"Completed",receiving:"FBA Receiving",misrouted:"\u26A0\uFE0F Needs Resolution",in_transit:"In Transit",production:"In Production"};
      return React.createElement("div",{key:status,style:{marginBottom:16}},
        React.createElement("div",{style:{fontSize:13,fontWeight:700,marginBottom:4,color:status==="misrouted"?C.red:C.text2}},labels[status]),
        React.createElement("div",{style:{background:C.surface,border:`1px solid ${status==="misrouted"?C.red+"40":C.border}`,borderRadius:10,padding:"4px 16px"}},
          items.map(s=>React.createElement(ShipCard,{key:s.id,s}))
        )
      );
    })
  );

  const forecastTab=React.createElement(React.Fragment,null,
    React.createElement("div",{style:{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}},
      React.createElement(Stat,{label:"Father's Day Week End",value:FORECAST[4].end.toLocaleString(),sub:"Jun 21",color:C.green}),
      React.createElement(Stat,{label:"Peak Rate",value:"~60/day",sub:"Jun 15-21",color:C.amber}),
      React.createElement(Stat,{label:"Low Point (Jun 14)",value:FORECAST[3].end.toLocaleString(),sub:"Before Maston",color:C.amber}),
      React.createElement(Stat,{label:"End of June",value:FORECAST[5].end.toLocaleString(),color:C.green})
    ),
    React.createElement("div",{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:16}},
      React.createElement("div",{style:{fontSize:14,fontWeight:700,marginBottom:12}},"Device Inventory Projection"),
      React.createElement(ResponsiveContainer,{width:"100%",height:250},
        React.createElement(LineChart,{data:forecastChart},
          React.createElement(CartesianGrid,{strokeDasharray:"3 3",stroke:C.border}),
          React.createElement(XAxis,{dataKey:"name",tick:{fontSize:11},axisLine:false}),
          React.createElement(YAxis,{tick:{fontSize:10},axisLine:false,domain:[0,"auto"]}),
          React.createElement(Tooltip,{contentStyle:{fontSize:12}}),
          React.createElement(ReferenceLine,{y:500,stroke:C.red,strokeDasharray:"3 3",label:{value:"Danger",fontSize:10,fill:C.red}}),
          React.createElement(Line,{type:"monotone",dataKey:"end",name:"End of Week",stroke:C.blue,strokeWidth:3,dot:{r:6,fill:C.blue}})
        )
      )
    ),
    React.createElement("div",{style:{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:16,marginBottom:16}},
      React.createElement("div",{style:{fontSize:14,fontWeight:700,marginBottom:10}},"Weekly Device Forecast"),
      React.createElement(ForecastTbl,null)
    ),
    React.createElement("div",{style:{background:C.amberL,border:`1.5px solid ${C.amber}40`,borderRadius:10,padding:"12px 16px"}},
      React.createElement("div",{style:{fontSize:13,fontWeight:700,color:C.amber,marginBottom:6}},"Assumptions & Risks"),
      React.createElement("div",{style:{fontSize:12,color:C.text2,lineHeight:1.7}},
        "Sell rates: 33/day recovering to 45 (FBA restock), ramping to 60 (Father\u2019s Day peak), normalizing to 40 post-holiday. Critical: Jun 8-14 is low point (1,466) before 1,008 Maston arrives. Maston must clear customs + J&J DG review. Misrouted LV\u2192CLB transfer (204 units) not included in forecast until resolved. Serrated at zero with 127 backorders \u2014 500 air expedite requested, no confirmation yet."
      )
    )
  );

  return React.createElement("div",{style:{maxWidth:960,margin:"0 auto",padding:"16px 14px 40px"}},
    header, mkTabs(),
    tab==="overview"&&overview,
    tab==="fba"&&fbaTab,
    tab==="shipments"&&shipTab,
    tab==="forecast"&&forecastTab,
    React.createElement("div",{style:{textAlign:"center",marginTop:20,fontSize:9,color:C.text3}},
      "BOXBLAYDE INVENTORY COMMAND CENTER v5 \u00B7 May 18, 2026 \u00B7 Source: ControlPort + Amazon Seller Central"
    )
  );
}

ReactDOM.render(React.createElement(App), document.getElementById("root"));
</script>
